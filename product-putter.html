<!doctype html>
<html class="no-js" lang="zh">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>推杆练习器 | T-Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/product-detail.css">
    <meta name="theme-color" content="#0a0a0a">
</head>

<body>

    <header class="tm-header scrolled" id="tm-header">
        <div class="tm-header-container">
            <a href="index.html" class="tm-logo">T-Master</a>
            <nav class="tm-nav">
                <ul class="tm-nav-list">
                    <li><a href="index.html#hero" data-i18n="nav-return-home">首页</a></li>
                    <li><a href="category.html?cat=simulator" data-i18n="nav-return-cat">返回产品分类</a></li>
                </ul>
            </nav>
            <a href="category.html?cat=simulator" class="tm-back-btn-mobile">⬅ <span data-i18n="nav-back">返回</span></a>
        </div>
    </header>

    <main class="tm-pdp-main">
        <section class="tm-pdp-hero">
            <div class="tm-pdp-gallery">
                <img id="pdp-main-img" src="img/products/果岭贝贝智能高尔夫推杆模拟器/gl3.jpg" alt="Putter Simulator">
            </div>
            <div class="tm-pdp-info">
                <h1 class="tm-pdp-title">果岭贝贝智能推杆模拟器</h1>
                <p class="tm-pdp-subtitle">GREEN BABY PUTTER SIMULATOR</p>
                <p class="tm-pdp-desc">
                    结合高精度传感系统与极佳的娱乐互动性，为您在家中或办公室内打造完美的果岭推杆体验。沉浸式场景设计，毫米级精度捕捉，是职业与业余爱好者提升推杆稳定性的绝佳利器。
                </p>

                <div class="tm-pdp-thumbs">
                    <img src="img/products/果岭贝贝智能高尔夫推杆模拟器/gl3.jpg" onclick="changeMainImg(this.src)" class="active">
                    <img src="img/products/果岭贝贝智能高尔夫推杆模拟器/gl1.jpg" onclick="changeMainImg(this.src)">
                    <img src="img/products/果岭贝贝智能高尔夫推杆模拟器/gl2.jpg" onclick="changeMainImg(this.src)">
                    <img src="img/products/果岭贝贝智能高尔夫推杆模拟器/gl4.jpg" onclick="changeMainImg(this.src)">
                </div>

                <a href="#details" class="tm-pdp-scroll-btn">详看业务资料参数 ↓</a>
            </div>
        </section>

        <!-- 高清合并长图展示区域 -->
        <section id="details" class="tm-pdp-details-section">
            <div class="tm-pdp-long-image-container" id="pdf-image-container">
                <!-- 脚本将把分页图片渲染到这里 -->
            </div>
        </section>
    </main>

    <footer class="tm-footer">
        <div class="tm-footer-logo">T-MASTER</div>
        <div class="tm-footer-copy" data-i18n="footer-copy">&copy; 2026 T-Master Ltd. 保留所有权利.</div>
    </footer>

    <script src="js/app.js"></script>

    <script>
        function changeMainImg(src) {
            document.getElementById('pdp-main-img').src = src;
            document.querySelectorAll('.tm-pdp-thumbs img').forEach(img => {
                img.classList.remove('active');
                if (img.src === src) img.classList.add('active');
            });
        }

        // 自动加载该文件夹下 PDF 导出的分页图片 (推杆模拟器有 33 页)
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('pdf-image-container');
            const totalPages = 33;
            const basePath = 'img/products/果岭贝贝智能高尔夫推杆模拟器/推杆模拟器GREENBABY（标）-G/';

            let htmlContent = '';
            for (let i = 1; i <= totalPages; i++) {
                // Assume names like 推杆模拟器GREENBABY（标）-G-1.jpg
                htmlContent += `<img src="${basePath}推杆模拟器GREENBABY（标）-G-${i}.jpg" alt="Page ${i}" loading="lazy" onerror="this.style.display='none'">`;
            }
            container.innerHTML = htmlContent;
        });
    </script>
</body>

</html>
