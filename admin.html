<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TEEMASTER 관리자</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --bg2: #111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8281e;
      --accent-hover: #a01e16;
      --text: #f0f0f0;
      --muted: #888;
      --green: #2ecc71;
      --red: #e74c3c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }

    /* ── Login ── */
    .login-wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%; max-width: 380px;
    }
    .login-logo {
      font-size: 1.6rem; font-weight: 800; letter-spacing: 3px;
      color: var(--accent); text-align: center; margin-bottom: 6px;
    }
    .login-sub { text-align: center; color: var(--muted); font-size: 0.8rem; margin-bottom: 32px; letter-spacing: 2px; }
    .login-label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
    .login-input {
      width: 100%; padding: 12px 14px; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.95rem; margin-bottom: 14px;
      transition: border-color .2s;
    }
    .login-input:focus { outline: none; border-color: var(--accent); }
    .login-btn {
      width: 100%; padding: 13px; background: var(--accent); color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .login-btn:hover { background: var(--accent-hover); }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 10px; text-align: center; min-height: 20px; }

    /* ── Admin layout ── */
    #admin-app { display: none; }
    .admin-header {
      background: #000; border-bottom: 1px solid var(--border);
      padding: 0 32px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; color: var(--accent); }
    .admin-logo span { color: var(--muted); font-weight: 400; font-size: 0.75rem; margin-left: 10px; letter-spacing: 1px; }
    .admin-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); padding: 6px 14px; border-radius: 6px;
      cursor: pointer; font-size: 0.8rem; transition: border-color .2s, color .2s;
    }
    .admin-logout:hover { border-color: var(--accent); color: var(--text); }

    .admin-body { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .admin-stats {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px 24px;
    }
    .stat-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 800; color: var(--text); }
    .stat-value.accent { color: var(--accent); }

    .section-title {
      font-size: 0.8rem; font-weight: 700; color: var(--muted);
      letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px;
    }

    .inquiry-table-wrap { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      background: var(--bg2); border-radius: 12px; overflow: hidden;
    }
    thead th {
      background: var(--bg3); color: var(--muted); font-size: 0.75rem;
      font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
      padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(200, 40, 30, 0.04); }
    tbody tr.unread { background: rgba(200, 40, 30, 0.06); }
    td {
      padding: 14px 16px; font-size: 0.875rem; color: var(--text);
      vertical-align: middle; max-width: 200px;
    }
    td .overflow { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; display: block; }
    td .muted { color: var(--muted); font-size: 0.78rem; }
    .badge-unread {
      display: inline-block; background: var(--accent); color: #fff;
      font-size: 0.65rem; padding: 2px 7px; border-radius: 10px; font-weight: 700;
      vertical-align: middle; margin-left: 4px;
    }
    .btn-read, .btn-del {
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.75rem; padding: 5px 10px;
      border-radius: 6px; cursor: pointer; transition: all .15s; white-space: nowrap;
    }
    .btn-read:hover { border-color: var(--green); color: var(--green); }
    .btn-del:hover { border-color: var(--red); color: var(--red); }
    .action-btns { display: flex; gap: 6px; flex-wrap: nowrap; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.9rem;
    }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

    /* Detail modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; padding: 20px;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; width: 100%; max-width: 520px;
      max-height: 80vh; overflow-y: auto;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
    .modal-field { margin-bottom: 14px; }
    .modal-field-label { font-size: 0.75rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
    .modal-field-value { font-size: 0.95rem; color: var(--text); white-space: pre-wrap; word-break: break-all; }
    .modal-close {
      margin-top: 24px; width: 100%; padding: 11px;
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 8px; cursor: pointer; font-size: 0.9rem;
      transition: border-color .2s;
    }
    .modal-close:hover { border-color: var(--accent); }

    @media (max-width: 640px) {
      .admin-stats { grid-template-columns: 1fr; }
      .admin-body { padding: 20px 16px; }
      .admin-header { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">TEEMASTER</div>
    <div class="login-sub">ADMIN PORTAL</div>
    <label class="login-label">관리자 아이디</label>
    <input type="text" class="login-input" id="login-user" placeholder="admin" autocomplete="username">
    <label class="login-label">비밀번호</label>
    <input type="password" class="login-input" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    <button class="login-btn" id="login-btn">로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Admin App -->
<div id="admin-app">
  <header class="admin-header">
    <div class="admin-logo">TEEMASTER <span>ADMIN</span></div>
    <button class="admin-logout" id="logout-btn">로그아웃</button>
  </header>
  <main class="admin-body">
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-label">전체 문의</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">미확인</div>
        <div class="stat-value accent" id="stat-unread">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">오늘 접수</div>
        <div class="stat-value" id="stat-today">—</div>
      </div>
    </div>

    <div class="section-title">문의 목록</div>
    <div class="inquiry-table-wrap">
      <table>
        <thead>
          <tr>
            <th>접수일시</th>
            <th>이름</th>
            <th>회사</th>
            <th>이메일</th>
            <th>연락처</th>
            <th>문의내용</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="inquiry-tbody">
          <tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div>데이터를 불러오는 중...</div></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Detail Modal -->
<div class="modal-overlay hidden" id="detail-modal">
  <div class="modal-box">
    <div class="modal-title">문의 상세 내용</div>
    <div id="modal-content"></div>
    <button class="modal-close" id="modal-close-btn">닫기</button>
  </div>
</div>

<script>
  const API = '';  // same origin
  let TOKEN = localStorage.getItem('tm_admin_token') || '';

  // ── Auth ────────────────────────────────────────────────
  async function login() {
    const user = document.getElementById('login-user').value.trim();
    const pass = document.getElementById('login-pass').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    try {
      const res = await fetch(API + '/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, password: pass })
      });
      const data = await res.json();
      if (data.success) {
        TOKEN = data.token;
        localStorage.setItem('tm_admin_token', TOKEN);
        showAdmin();
      } else {
        errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
      }
    } catch (e) {
      errEl.textContent = '서버 연결에 실패했습니다.';
    }
  }

  function logout() {
    TOKEN = '';
    localStorage.removeItem('tm_admin_token');
    document.getElementById('admin-app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pass').value = '';
  }

  function showAdmin() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-app').style.display = 'block';
    loadInquiries();
  }

  // ── Inquiries ────────────────────────────────────────────
  async function loadInquiries() {
    try {
      const res = await fetch(API + '/api/admin/inquiries', {
        headers: { 'Authorization': 'Bearer ' + TOKEN }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      renderInquiries(Array.isArray(data) ? data : []);
    } catch (e) {
      document.getElementById('inquiry-tbody').innerHTML =
        '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">⚠️</div>데이터 로드 실패</div></td></tr>';
    }
  }

  function renderInquiries(list) {
    // Sort newest first
    list.sort((a, b) => b.createdAt.localeCompare(a.createdAt));

    const today = new Date().toISOString().slice(0, 10);
    const unread = list.filter(i => !i.read).length;
    const todayCount = list.filter(i => i.createdAt && i.createdAt.startsWith(today)).length;

    document.getElementById('stat-total').textContent = list.length;
    document.getElementById('stat-unread').textContent = unread;
    document.getElementById('stat-today').textContent = todayCount;

    const tbody = document.getElementById('inquiry-tbody');
    if (list.length === 0) {
      tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📭</div>아직 접수된 문의가 없습니다.</div></td></tr>';
      return;
    }

    tbody.innerHTML = list.map(item => `
      <tr class="${!item.read ? 'unread' : ''}" id="row-${item.id}">
        <td><span class="muted">${item.createdAt || ''}</span></td>
        <td>
          <span class="overflow">${esc(item.name || '')}${!item.read ? '<span class="badge-unread">NEW</span>' : ''}</span>
        </td>
        <td><span class="overflow">${esc(item.company || '-')}</span></td>
        <td><span class="overflow">${esc(item.email || '')}</span></td>
        <td><span class="overflow">${esc(item.phone || '-')}</span></td>
        <td>
          <span class="overflow" style="cursor:pointer;color:#aaa" onclick="showDetail(${JSON.stringify(item).replace(/"/g,'&quot;')})">
            ${esc((item.intent || '').substring(0, 40))}${(item.intent || '').length > 40 ? '…' : ''}
          </span>
        </td>
        <td>
          <div class="action-btns">
            ${!item.read ? `<button class="btn-read" onclick="markRead('${item.id}')">확인</button>` : ''}
            <button class="btn-del" onclick="deleteItem('${item.id}')">삭제</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function markRead(id) {
    await fetch(API + '/api/admin/inquiries/' + id + '/read', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    loadInquiries();
  }

  async function deleteItem(id) {
    if (!confirm('이 문의를 삭제하시겠습니까?')) return;
    await fetch(API + '/api/admin/inquiries/' + id + '/delete', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    loadInquiries();
  }

  // ── Detail modal ────────────────────────────────────────
  function showDetail(item) {
    const fields = [
      ['접수일시', item.createdAt],
      ['이름 / Name', item.name],
      ['회사 / Company', item.company || '-'],
      ['이메일 / Email', item.email],
      ['연락처 / Phone', item.phone || '-'],
      ['문의 내용', item.intent],
    ];
    document.getElementById('modal-content').innerHTML = fields.map(([k, v]) => `
      <div class="modal-field">
        <div class="modal-field-label">${k}</div>
        <div class="modal-field-value">${esc(v || '')}</div>
      </div>
    `).join('');
    document.getElementById('detail-modal').classList.remove('hidden');
    if (!item.read) markRead(item.id);
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Init ─────────────────────────────────────────────────
  document.getElementById('login-btn').addEventListener('click', login);
  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('login-user').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('modal-close-btn').addEventListener('click', () => {
    document.getElementById('detail-modal').classList.add('hidden');
  });
  document.getElementById('detail-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.add('hidden');
  });

  // Auto-login if token saved
  if (TOKEN) showAdmin();
</script>
</body>
</html>
